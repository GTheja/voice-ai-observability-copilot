version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    command: node src/server.js
    env_file: .env
    environment:
      ROLE: api
      DATABASE_URL: postgres://copilot:copilot@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8080:8080"

  backend-worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    command: node src/worker.js
    env_file: .env
    environment:
      ROLE: worker
      DATABASE_URL: postgres://copilot:copilot@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend-api

volumes:
  pgdata:
